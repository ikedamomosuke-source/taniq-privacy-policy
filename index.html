<h1>プライバシーポリシー</h1>
<p>最終更新日：2026年4月29日</p>

<h2>収集する情報</h2>
<p>TANIQは、端末識別子（デバイスID）を使用してクイズの成績・連続記録を保存します。氏名・メールアドレス等の個人情報は収集しません。</p>

<h2>情報の利用目的</h2>
<p>収集した情報は、アプリ内の成績管理・連続記録の表示のみに使用します。第三者への提供は行いません。</p>

<h2>お問い合わせ</h2>
<p>ご不明な点はアプリ内のお問い合わせよりご連絡ください。</p>
